services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ballast
      POSTGRES_PASSWORD: ballast
      POSTGRES_DB: ballast
    ports:
      - "${BALLAST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ballast"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-image:
    build:
      context: .
      dockerfile: sandbox-image/Dockerfile
    image: ballast-runner-base:dev
    entrypoint: ["/bin/true"]
    restart: "no"

  ballast-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["-config", "/etc/ballast/ballast.yaml"]
    environment:
      BALLAST_JWT_SECRET: ballast-dev-secret-change-me
      BALLAST_ADMIN_TOKEN: ballast-dev-admin-token
      BALLAST_INTERNAL_TOKEN: ballast-dev-internal-token
      BALLAST_WEB_ORIGIN: ${BALLAST_WEB_ORIGIN:-http://localhost:3000}
      BALLAST_ENVIRONMENT: development
      BALLAST_COOKIE_SECURE: "false"
      BALLAST_POLICY_DIR: /etc/ballast/policies
      BALLAST_CONTROL_PLANE_URL: http://host.docker.internal:8080
      BALLAST_WORKSPACE_ROOT: ${BALLAST_WORKSPACE_ROOT:-/tmp/ballast/sandboxes}
      BALLAST_RUNNER_COMMAND: ${BALLAST_RUNNER_COMMAND:-/usr/local/bin/mock-opencode}
      BALLAST_RUNNER_ARGS: ${BALLAST_RUNNER_ARGS:-}
      BALLAST_GIT_BRANCH: "${BALLAST_GIT_BRANCH:-}"
      BALLAST_GIT_BRANCH_PREFIX: "${BALLAST_GIT_BRANCH_PREFIX:-ballast}"
      BALLAST_GIT_COMMIT_MESSAGE: "${BALLAST_GIT_COMMIT_MESSAGE:-ballast: automated workspace update}"
      BALLAST_GIT_PUSH: "${BALLAST_GIT_PUSH:-}"
      BALLAST_GIT_REMOTE: "${BALLAST_GIT_REMOTE:-origin}"
      BALLAST_GIT_PR_URL_TEMPLATE: "${BALLAST_GIT_PR_URL_TEMPLATE:-}"
      BALLAST_GIT_AUTHOR_NAME: "${BALLAST_GIT_AUTHOR_NAME:-Ballast Automation}"
      BALLAST_GIT_AUTHOR_EMAIL: "${BALLAST_GIT_AUTHOR_EMAIL:-ballast@example.invalid}"
      BALLAST_TERRAFORM_VALIDATE: "${BALLAST_TERRAFORM_VALIDATE:-}"
      BALLAST_KUBECONFIG: ${BALLAST_KUBECONFIG:-}
      BALLAST_KUBECONFIG_REWRITE_LOCALHOST: ${BALLAST_KUBECONFIG_REWRITE_LOCALHOST:-true}
      BALLAST_KUBE_NAMESPACE: ${BALLAST_KUBE_NAMESPACE:-ballast-demo}
      BALLAST_KUBE_TARGET_SELECTOR: ${BALLAST_KUBE_TARGET_SELECTOR:-app=crashloop-demo}
      BALLAST_KUBE_TARGET_DEPLOYMENT: ${BALLAST_KUBE_TARGET_DEPLOYMENT:-crashloop-demo}
      BALLAST_KUBE_FIX_CONFIGMAP: ${BALLAST_KUBE_FIX_CONFIGMAP:-crashloop-demo-config}
      BALLAST_APPROVAL_WEBHOOK_URL: ${BALLAST_APPROVAL_WEBHOOK_URL:-}
      BALLAST_APPROVAL_WEBHOOK_KIND: ${BALLAST_APPROVAL_WEBHOOK_KIND:-generic}
      BALLAST_CONSOLE_BASE_URL: ${BALLAST_CONSOLE_BASE_URL:-http://localhost:3300}
      DATABASE_DSN: postgres://ballast:ballast@postgres:5432/ballast?sslmode=disable
    ports:
      - "${BALLAST_SERVER_PORT:-8080}:8080"
    volumes:
      - ./server/configs/ballast.yaml:/etc/ballast/ballast.yaml:ro
      - ./policies:/etc/ballast/policies:ro
      - ${BALLAST_WORKSPACE_ROOT:-/tmp/ballast/sandboxes}:${BALLAST_WORKSPACE_ROOT:-/tmp/ballast/sandboxes}
      - ${BALLAST_REAL_K8S_ROOT:-/tmp/ballast/real-k8s}:${BALLAST_REAL_K8S_ROOT:-/tmp/ballast/real-k8s}
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
    ports:
      - "${BALLAST_WEB_PORT:-3000}:3000"
    depends_on:
      ballast-server:
        condition: service_healthy

volumes:
  pgdata:
